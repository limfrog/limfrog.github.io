<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-site-verification" content="PqxZCCe0B2p3Ij0t-VCL5ABrFHKBoYfm_hOFLVrOfn4" />
  <title>나의 레슨일지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      background: #f7f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      border: 1.5px solid #f0f0f5;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(99,102,241,0.08);
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      margin-bottom: 32px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .links a {
      font-size: 13px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 700;
    }
    .links a:hover { text-decoration: underline; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- 로고 -->
    <img class="logo" src="https://limfrog.github.io/mylesson/logo.png" alt="나의 레슨일지 로고"
      onerror="this.style.display='none'"/>

    <h1>나의 레슨일지</h1>
    <p class="sub">
      음악 레슨 선생님을 위한<br>
      학생 관리 &amp; 수업 기록 앱
    </p>

    <a class="btn" href="https://limfrog.github.io/mylesson/">앱 시작하기 →</a>

    <div class="links">
      <a href="https://limfrog.github.io/mylesson/privacy.html">개인정보처리방침</a>
      <a href="https://limfrog.github.io/mylesson/terms.html">서비스 이용약관</a>
      <a href="/cdn-cgi/l/email-protection#6d0104000b1f020a5a582d0a000c0401430e0200">문의하기</a>
    </div>
  </div>

  <div class="footer">© 2026 나의 레슨일지 �
